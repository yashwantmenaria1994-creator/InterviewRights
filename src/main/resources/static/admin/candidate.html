<!DOCTYPE html>
<html>

<head>
	<title>Admin Dashboard</title>
	<link rel="stylesheet" href="/admin/css/admin.css">
</head>

<body>

	<!-- HEADER -->

	<div class="header">
		<h2>Interview-Rights Admin</h2>
		<div class="user-info" id="userEmail">
		</div>
		<button class="logout-btn" onclick="logout()">Logout</button>

	</div>

	<!-- MAIN -->
	<div class="container">

		<!-- SIDEBAR -->
		<div class="sidebar">
			<a href="/admin/admin-dashboard.html">Dashboard</a>
			<a href="/admin/candidate.html">Candidates</a>
			<a href="/admin/invite-user.html">Invite</a>
			<a href="/admin/settings.html">Settings</a>
		</div>

		<!-- CONTENT -->
		<div class="content">

			<h2>All Candidates</h2>

			<div class="table-container">
				<table class="admin-table">
					<thead>
						<tr>
							<th>#</th>
							<th>Name</th>
							<th>Email</th>
							<th>Role</th>
							<th>Status</th>
							<th>Action</th>
							
						</tr>
					</thead>

					<tbody id="candidateTable">
						<!-- data via JS -->
					</tbody>
				</table>
			</div>

		</div>
		<div id="scheduleModal" class="modal">
    <div class="modal-content">

        <span class="close-btn" onclick="closeScheduleModal()">✖</span>

        <h3>Schedule Interview</h3>

        <input type="hidden" id="candidateEmail">

        <label>Interview Date</label>
        <input type="date" id="interviewDate">

        <label>Interview Time</label>
        <input type="time" id="interviewTime">

        <label>Google Meet Link</label>
        <input type="text" id="interviewLink" placeholder="https://meet.google.com/...">

        <label>Expiry Duration (minutes)</label>
        <input type="number" id="expiryTime" placeholder="e.g. 60">

        <div class="modal-actions">
            <button class="btn-secondary" onclick="closeScheduleModal()">Cancel</button>
            <button class="btn-primary" onclick="scheduleInterview()">Schedule</button>
        </div>

    </div>
</div>
		<script src="/admin/js/admin-common.js"></script>
</body>

</html>
