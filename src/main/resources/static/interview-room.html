<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width,initial-scale=1">

	<title>Secure Interview</title>

	<style>
		body {
			margin: 0;
			font-family: Arial;
			background: #0f172a;
			color: white;
			height: 100vh;
			overflow: hidden;
		}

		.container {
			display: grid;
			grid-template-columns: 2fr 350px;
			grid-template-rows: 60% 40%;
			gap: 12px;
			padding: 12px;
			height: 100vh;
		}

		.video-section {
			display: grid;
			grid-template-columns: 1fr 1fr;
			gap: 12px;
		}

		.card {
			background: #1e293b;
			border-radius: 18px;
			padding: 15px;
		}

		video {
			width: 100%;
			height: 82%;
			background: #000;
			border-radius: 12px;
			object-fit: cover;
		}

		.side {
			grid-row: 1/span 2;
		}

		.monitor-box {
			background: #334155;
			padding: 12px;
			border-radius: 12px;
			margin-bottom: 12px;
		}

		textarea {
			width: 100%;
			height: 80%;
			background: #111827;
			color: white;
			border: none;
			padding: 15px;
			border-radius: 12px;
		}

		.btn {
			width: 100%;
			padding: 12px;
			margin-top: 10px;
			border: none;
			border-radius: 10px;
			background: #2563eb;
			color: white;
			font-weight: bold;
			cursor: pointer;
		}

		.role-badge {
			position: fixed;
			top: 15px;
			right: 15px;
			background: #2563eb;
			padding: 10px 18px;
			border-radius: 25px;
		}
	</style>
</head>

<body>

	<div class="role-badge" id="roleBadge">
	</div>


	<button id="startBtn" class="btn" onclick="startInterview()">
		Start Interview
	</button>

	<button class="btn" onclick="finishInterview()">
		Finish Interview
	</button>

	<div class="container">

		<div class="video-section">

			<div class="card">
				<h3>My Camera</h3>
				<video id="localVideo" autoplay muted playsinline>
				</video>
			</div>


			<div class="card">
				<h3>Remote Participant</h3>
				<video id="remoteVideo" autoplay playsinline>
				</video>
			</div>

		</div>



		<div class="card side" id="trustPanel">

			<h3 id="monitorTitle">
				Candidate Trust Monitor
			</h3>

			<div id="monitorSection">

				<div class="monitor-box">
					Interview Time:
					<span id="interviewTimer">
						00:00
					</span>
				</div>

				<div class="monitor-box">
					Risk:
					<span id="risk">
						100
					</span>
				</div>

				<div class="monitor-box">
					Tab Violations:
					<span id="tabCount">
						0
					</span>
				</div>

				<div class="monitor-box">
					Face Status:
					<span id="faceStatus">
						Waiting...
					</span>
				</div>

			</div>

			<button class="btn" onclick="shareScreen()">
				Share Screen
			</button>

			<div id="alerts">
				No Alerts
			</div>

		</div>



		<div class="card">
			<h3>Coding Panel</h3>

			<textarea>
				Solve here...
			</textarea>

		</div>

	</div>
	<script src="https://unpkg.com/face-api.js@0.22.2/dist/face-api.min.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/sockjs-client/dist/sockjs.min.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/stompjs/lib/stomp.min.js"></script>
	<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

	<script src="/js/interview-room.js"></script>
</body>

</html>
